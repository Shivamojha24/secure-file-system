<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.card{
    backdrop-filter:blur(15px);
    background:rgba(30,41,59,0.6);
    padding:30px;
    border-radius:20px;
    width:320px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,0.6);
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#0f172a;
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,#22c55e,#4ade80);
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.secondary{
    background:#475569;
}
</style>

</head>

<body>

<div class="card">
    <h2>📝 Register</h2>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="register()">Create Account</button>
    <button class="secondary" onclick="goLogin()">Back to Login</button>
</div>

<script>
function register(){
    let username = document.getElementById("user").value;
    let password = document.getElementById("pass").value;

    fetch("/api/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({username,password})
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        window.location.href="/";
    });
}

function goLogin(){
    window.location.href="/";
}
</script>

</body>
</html>
