<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

/* SIDEBAR */
.sidebar{
    width:220px;
    background:#020617;
    height:100vh;
    padding:20px;
    position:fixed;
}

.sidebar h2{
    color:#38bdf8;
}

.sidebar button{
    width:100%;
    margin:10px 0;
    padding:12px;
    background:#1e293b;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.sidebar button:hover{
    background:#334155;
}

/* MAIN */
.main{
    margin-left:240px;
    padding:30px;
}

/* CARD */
.card{
    background:rgba(30,41,59,0.8);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

/* STATS */
.stats{
    display:flex;
    gap:20px;
    margin-bottom:25px;
}

.stat-box{
    flex:1;
    padding:20px;
    border-radius:15px;
}

.users{
    background:linear-gradient(135deg,#3b82f6,#06b6d4);
}

.files{
    background:linear-gradient(135deg,#22c55e,#16a34a);
}

/* BUTTON */
button{
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

/* DRAG AREA */
#dropArea{
    border:2px dashed #334155;
    padding:20px;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
}

/* FILE LIST */
li{
    background:#334155;
    margin:6px 0;
    padding:10px;
    border-radius:8px;
    list-style:none;
}

/* PROGRESS */
#progressContainer{
    width:100%;
    background:#1e293b;
    border-radius:6px;
    display:none;
}

#progressBar{
    height:10px;
    width:0%;
    background:#22c55e;
}

/* TOAST */
#toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#22c55e;
    padding:10px;
    border-radius:6px;
    display:none;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🔐 SecureFS</h2>
    <button onclick="loadFiles()">📂 Files</button>
    <button onclick="logout()">🚪 Logout</button>
    <button onclick="toggleTheme()">🌗 Toggle</button>
</div>

<!-- MAIN -->
<div class="main">

<h2>Dashboard</h2>

<!-- ADMIN STATS -->
<div id="statsSection" class="stats">
    <div class="stat-box users">
        <h3>👤 Users</h3>
        <h1 id="userCount">0</h1>
    </div>

    <div class="stat-box files">
        <h3>📁 Files</h3>
        <h1 id="fileCount">0</h1>
    </div>
</div>

<!-- UPLOAD -->
<div class="card">
    <h3>Upload File</h3>

    <div id="dropArea">📂 Drag & Drop file here</div>

    <input type="file" id="file"><br>

    <button onclick="upload()">Upload</button>

    <div id="progressContainer">
        <div id="progressBar"></div>
    </div>
</div>

<!-- FILE LIST -->
<div class="card">
    <h3>Your Files</h3>
    <ul id="list"></ul>
</div>

</div>

<div id="toast"></div>

<script>

// TOAST
function showToast(msg){
    let t=document.getElementById("toast");
    t.innerText=msg;
    t.style.display="block";
    setTimeout(()=>{ t.style.display="none"; },2000);
}

// UPLOAD
function upload(){
    let f=document.getElementById("file").files[0];

    if(!f){
        showToast("Select file first");
        return;
    }

    let form=new FormData();
    form.append("file",f);

    let xhr=new XMLHttpRequest();
    xhr.open("POST","/api/upload",true);
    xhr.withCredentials=true;

    let bar=document.getElementById("progressBar");
    let container=document.getElementById("progressContainer");

    container.style.display="block";

    xhr.upload.onprogress=function(e){
        let percent=(e.loaded/e.total)*100;
        bar.style.width=percent+"%";
    };

    xhr.onload=function(){
        showToast("Upload complete");
        bar.style.width="0%";
        container.style.display="none";
        loadFiles();
    };

    xhr.send(form);
}

// LOAD FILES
function loadFiles(){
    fetch("/api/files",{credentials:"include"})
    .then(res=>res.json())
    .then(files=>{
        let list=document.getElementById("list");
        list.innerHTML="";

        if(files.length===0){
            list.innerHTML="<li>No files</li>";
            return;
        }

        files.forEach(f=>{
            let li=document.createElement("li");
            li.innerHTML=`
                <div style="display:flex;justify-content:space-between;">
                    <span>📄 ${f}</span>
                    <a href="/api/download/${f}" style="color:#38bdf8;">Download</a>
                </div>
            `;
            list.appendChild(li);
        });
    });
}

// LOGOUT
function logout(){
    fetch("/api/logout",{credentials:"include"})
    .then(()=>window.location.href="/");
}

// DRAG DROP
let dropArea=document.getElementById("dropArea");
let fileInput=document.getElementById("file");

dropArea.onclick=()=>fileInput.click();

dropArea.addEventListener("dragover",e=>{
    e.preventDefault();
    dropArea.style.background="#334155";
});

dropArea.addEventListener("dragleave",()=>{
    dropArea.style.background="transparent";
});

dropArea.addEventListener("drop",e=>{
    e.preventDefault();
    fileInput.files=e.dataTransfer.files;
    dropArea.style.background="transparent";
});

// THEME
function toggleTheme(){
    let body=document.body;
    if(body.style.background==="white"){
        body.style.background="#0f172a";
        body.style.color="white";
    } else {
        body.style.background="white";
        body.style.color="black";
    }
}

// ADMIN STATS
function loadStats(){

    fetch("/api/user_count",{credentials:"include"})
    .then(res=>{
        if(res.status===403){
            document.getElementById("statsSection").style.display="none";
            return null;
        }
        return res.json();
    })
    .then(data=>{
        if(data){
            document.getElementById("userCount").innerText=data.users;
        }
    });

    fetch("/api/file_count",{credentials:"include"})
    .then(res=>{
        if(res.status===403){
            return null;
        }
        return res.json();
    })
    .then(data=>{
        if(data){
            document.getElementById("fileCount").innerText=data.files;
        }
    });
}

// AUTO LOAD
loadFiles();
loadStats();

</script>

</body>
</html>
