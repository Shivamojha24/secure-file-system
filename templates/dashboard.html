<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
    background:#0f172a;
    color:white;
    text-align:center;
    font-family:Arial;
}

.box{
    width:400px;
    margin:auto;
    margin-top:50px;
    background:#1e293b;
    padding:20px;
    border-radius:10px;
}

button{
    padding:10px;
    margin:8px;
    border:none;
    border-radius:5px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

li{
    background:#334155;
    margin:5px;
    padding:8px;
    border-radius:5px;
}

a{
    color:#38bdf8;
    margin-left:10px;
}
</style>

</head>
<body>

<div class="box">
    <h2>📂 Dashboard</h2>

    <input type="file" id="file">
    <br>
    <button type="button" onclick="upload()">Upload</button>

    <br>
    <button type="button" onclick="loadFiles()">Load Files</button>

    <ul id="list"></ul>

    <button type="button" onclick="logout()">Logout</button>
</div>

<script>

function upload(){
    let fileInput = document.getElementById("file");
    let f = fileInput.files[0];

    if(!f){
        alert("Please select a file first");
        return;
    }

    let form = new FormData();
    form.append("file", f);

    fetch("/api/upload", {
        method: "POST",
        credentials: "include",
        body: form
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);
        alert(data.message);
    })
    .catch(err => {
        console.error(err);
        alert("Upload failed");
    });
}

function loadFiles(){
    fetch("/api/files", {
        credentials: "include"
    })
    .then(res => res.json())
    .then(files => {
        let list = document.getElementById("list");
        list.innerHTML = "";

        if(files.length === 0){
            list.innerHTML = "<li>No files uploaded</li>";
            return;
        }

        files.forEach(f => {
            let li = document.createElement("li");
            li.innerHTML = f + 
            ` <a href="/api/download/${f}">Download</a>`;
            list.appendChild(li);
        });
    })
    .catch(err => {
        console.error(err);
        alert("Failed to load files");
    });
}

function logout(){
    fetch("/api/logout", {
        credentials: "include"
    })
    .then(() => {
       window.location.href = "http://127.0.0.1:5000/";
    });
}

</script>

</body>
</html>
